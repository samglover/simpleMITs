<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" type="image/svg" href="assets/img/simpleMITs-logo.svg?ver=1.2.2">
  <link rel="manifest" href="manifest.json?ver=1.2.2">
  <link rel="stylesheet" href="includes/normalize/normalize.css?ver=1.2.2">
  <link rel="stylesheet" href="assets/css/jost.css?ver=1.2.2">
  <link rel="stylesheet" href="assets/css/style.css?ver=1.2.2">
  <title>simpleMITs</title>
</head>
<body onload="listMITs()">
  <div class="page-container">
    <header class="page-header row gap-xs">
      <img src="assets/img/simpleMITs-logo.svg?ver=1.2.2" alt="simpleMITs logo">
      <h1>simpleMITs</h1>
    </header>
    <ul id="task-list" class="task-list"></ul>
    <!-- Clear buttons -->
    <div id="clear-buttons" class="row gap-tiny">
      <!-- Clear completed button -->
      <button id="clear-completed-button" class="modal-button" data-modal-id="clear-completed-modal">Clear completed</button>
      <dialog id="clear-completed-modal" class="modal confirmation-modal">
        <div class="confirmation-modal-container">
          <h4>Clear completed MITs?</h4>
          <button class="confirm" onclick="clearCompleted()"><span class="screen-reader-text">Clear completed</span></button>
          <button class="cancel"><span class="screen-reader-text">Cancel</span></button>
        </div>
      </dialog>
      <!-- Clear all button -->
      <button id="clear-all-button" class="modal-button" data-modal-id="clear-all-modal">Clear all</button>
      <dialog id="clear-all-modal" class="modal confirmation-modal">
        <div class="confirmation-modal-container">
          <h4>Clear all MITs?</h4>
          <button class="confirm" onclick="clearAll()"><span class="screen-reader-text">Clear all</span></button>
          <button class="cancel"><span class="screen-reader-text">Cancel</span></button>
        </div>
      </dialog>
    </div>
    <!-- New task form -->
    <form id="add-task-form">
      <label for="add-task-input">What's the most important thing you could do today?</label>
      <div class="input-group">
        <input id="add-task-input" type="text" placeholder="Add an important task">
        <button type="submit"><span class="screen-reader-text">Add task</span></button>
      </div>
    </form>
    <footer class="row">
      <p>simpleMITs <span id="simplemits-version">1.2.2</span> by <a href="https://samglover.net" target="_blank">Sam Glover</a></p>
      <div class="col row gap-xs">
        <!-- Prefs -->
        <div class="prefs row gap-tiny">
          <button class="square-button size-button decrease-size-button">
            <span class="screen-reader-text">Decrease text size</span>
          </button>
          <button class="square-button size-button increase-size-button">
            <span class="screen-reader-text">Increase text size</span>
          </button>
          <button class="square-button max-min-button">
            <span class="screen-reader-text"></span>
          </button>
        </div>
        <!-- FAQ -->
        <button class="modal-button square-button faq-button" data-modal-id="faq-modal">?</button>
        <dialog id="faq-modal" class="modal content-modal">
          <div class="modal-header">
            <h4>simpleMITs FAQ</h4>
            <button class="close-modal"><span class="screen-reader-text">Close modal</span></button>
          </div>
          <div class="modal-content"></div>
        </dialog>
      </div>
    </footer>
  </div>
  <script type="text/javascript" src="includes/jquery/jquery-3.7.1.min.js"></script>
  <script type="text/javascript" src="includes/chance/chance.min.js?ver=1.2.2"></script>
  <script type="text/javascript" src="assets/js/main.js?ver=1.2.2"></script>
  <script type="text/javascript" src="assets/js/drag-and-drop.js?ver=1.2.2"></script>
  <script type="text/javascript" src="assets/js/modals.js?ver=1.2.2"></script>
  <script type="text/javascript" src="assets/js/prefs.js?ver=1.2.2"></script>
  <script type="text/javascript" src="assets/js/template-loader.js?ver=1.2.2"></script>
</body>
</html>
